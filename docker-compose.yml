services:
  moodledb:
    image: mysql:8.0
    container_name: contech_moodledb
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodle@123
    volumes:
      - moodledb_data:/var/lib/mysql
    restart: always

  moodle:
    image: moodlehq/moodle-php-apache:8.1
    container_name: contech_moodle
    depends_on:
      - moodledb
    ports:
      - "8080:80"
    environment:
      MOODLE_DB_HOST: moodledb
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASSWORD: moodle@123
    volumes:
      - moodle_data:/var/www/html
    restart: always

volumes:
  moodledb_data:
  moodle_data:
